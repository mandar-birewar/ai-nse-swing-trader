name: NSE AI Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '40 12 * * 1-5'

jobs:

  run-ai:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Train model
      run: python train_model.py

    - name: Run scanner
      run: python scanner_nse_fast.py
